<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Treeniapp</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
/* ─── Design tokens ─────────────────────────────────────────── */
:root {
  --bg:        #0d0d0d;
  --surface:   #161616;
  --surface2:  #1e1e1e;
  --surface3:  #272727;
  --border:    #2a2a2a;
  --border2:   #333;

  --text:      #efefef;
  --text2:     #888;
  --text3:     #4a4a4a;

  --teal:      #1D9E75;
  --teal-dim:  #0f6e56;
  --teal-bg:   #071e15;

  --blue:      #378ADD;
  --amber:     #EF9F27;
  --amber-bg:  #231700;
  --red:       #E24B4A;

  --r:  10px;
  --rs: 6px;
  --t:  .15s ease;
}

/* ─── Reset & base ──────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ─── Navigation ────────────────────────────────────────────── */
nav {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(13,13,13,.92);
  backdrop-filter: saturate(180%) blur(12px);
  -webkit-backdrop-filter: saturate(180%) blur(12px);
  border-bottom: 1px solid var(--border);
  display: flex;
  overflow-x: auto;
  scrollbar-width: none;
}
nav::-webkit-scrollbar { display: none; }
nav button {
  flex: 1;
  min-width: 70px;
  padding: 14px 6px;
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  color: var(--text2);
  font-size: 12px;
  font-weight: 500;
  letter-spacing: .02em;
  cursor: pointer;
  white-space: nowrap;
  transition: color var(--t);
}
nav button.active { color: var(--teal); border-bottom-color: var(--teal); }
nav button:not(.active):hover { color: var(--text); }

/* ─── Pages ─────────────────────────────────────────────────── */
.page { display: none; padding: 14px; max-width: 600px; margin: 0 auto; }
.page.active { display: block; }

/* ─── Cards ─────────────────────────────────────────────────── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 14px;
  margin-bottom: 12px;
}
.card-title {
  font-size: 10px;
  font-weight: 600;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: .08em;
  margin-bottom: 12px;
}

/* ─── Metric grid ────────────────────────────────────────────── */
.metric-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-bottom: 14px;
}
.metric {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--rs);
  padding: 12px;
}
.metric-label { font-size: 10px; color: var(--text3); margin-bottom: 4px; }
.metric-value { font-size: 20px; font-weight: 600; line-height: 1; }

/* ─── Forms ──────────────────────────────────────────────────── */
.form-row { display: flex; gap: 8px; align-items: center; margin-bottom: 9px; }
.form-row label { font-size: 13px; color: var(--text2); min-width: 90px; }
input[type=number], input[type=date], select {
  flex: 1;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--rs);
  color: var(--text);
  padding: 8px 11px;
  font-size: 14px;
  outline: none;
  transition: border-color var(--t);
}
input:focus, select:focus { border-color: var(--teal); }
input[type=date]::-webkit-calendar-picker-indicator { filter: invert(.5); }
.btn {
  padding: 10px 20px;
  border-radius: var(--rs);
  border: none;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: all var(--t);
}
.btn-primary { background: var(--teal); color: #fff; width: 100%; margin-top: 6px; }
.btn-primary:hover  { background: var(--teal-dim); }
.btn-primary:active { transform: scale(.98); }

/* ─── Week nav ───────────────────────────────────────────────── */
.week-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.week-label { font-size: 12px; color: var(--text2); font-weight: 500; }
.week-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--text2);
  padding: 5px 12px;
  border-radius: var(--rs);
  cursor: pointer;
  font-size: 12px;
  transition: all var(--t);
}
.week-btn:hover { border-color: var(--border2); color: var(--text); }

/* ─── Day tabs ───────────────────────────────────────────────── */
.day-tabs { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 12px; }
.day-tab {
  flex: 1;
  min-width: 52px;
  padding: 8px 3px;
  text-align: center;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--rs);
  font-size: 11px;
  cursor: pointer;
  color: var(--text2);
  transition: all var(--t);
}
.day-tab.active { border-color: var(--teal); color: var(--teal); background: var(--teal-bg); }
.day-tab.done   { border-color: var(--teal-dim); color: var(--teal-dim); }
.day-tab.rest   { color: var(--text3); }

/* ─── Progress ───────────────────────────────────────────────── */
.prog-wrap { margin-bottom: 12px; }
.prog-bg   { height: 2px; background: var(--surface2); border-radius: 2px; }
.prog-fill { height: 2px; background: var(--teal); border-radius: 2px; transition: width .5s ease; }
.prog-text { font-size: 11px; color: var(--text3); margin-top: 4px; }

/* ─── Exercise items ─────────────────────────────────────────── */
.ex-item {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--rs);
  padding: 12px;
  margin-bottom: 8px;
}
.ex-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 10px;
  gap: 8px;
}
.ex-name { font-size: 14px; font-weight: 500; }
.ex-prev { font-size: 11px; color: var(--text3); text-align: right; flex-shrink: 0; line-height: 1.5; }

/* ─── Set boxes ──────────────────────────────────────────────── */
.sets-row { display: flex; gap: 5px; flex-wrap: wrap; }

.set-box {
  border: 1px solid var(--border);
  border-radius: var(--rs);
  padding: 7px 6px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  background: var(--surface);
  transition: border-color .25s, background .25s;
}

/* 🔴 Undone */
.set-box.s-undone  { border-color: #E24B4A; background: rgba(226,75,74,.08); }
/* 🟡 Worse */
.set-box.s-worse   { border-color: #EF9F27; background: rgba(239,159,39,.08); }
/* 🔵 Same */
.set-box.s-same    { border-color: #378ADD; background: rgba(55,138,221,.08); }
/* 🟢 Better */
.set-box.s-better  { border-color: #1D9E75; background: rgba(29,158,117,.08); }

.set-label    { font-size: 9px; color: var(--text3); font-weight: 600; letter-spacing: .04em; }
.set-prev-ref { font-size: 9px; color: var(--text3); margin-top: 1px; white-space: nowrap; }
.set-inputs   { display: flex; gap: 3px; align-items: center; }
.set-input {
  width: 48px;
  padding: 5px 3px;
  font-size: 13px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text);
  text-align: center;
  outline: none;
  transition: border-color var(--t);
}
.set-input:focus { border-color: var(--teal); }
.set-sep { font-size: 11px; color: var(--text3); }

/* ─── PR badge ───────────────────────────────────────────────── */
.pr-badge {
  font-size: 10px;
  background: var(--amber-bg);
  color: var(--amber);
  border-radius: 4px;
  padding: 1px 6px;
  margin-left: 6px;
  font-weight: 600;
  letter-spacing: .03em;
}

/* ─── Complete button ────────────────────────────────────────── */
.complete-btn {
  width: 100%;
  margin-top: 12px;
  padding: 12px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--rs);
  color: var(--text2);
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: all var(--t);
}
.complete-btn.done { background: var(--teal-bg); border-color: var(--teal); color: var(--teal); }

/* ─── History ────────────────────────────────────────────────── */
.hist-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 9px 0;
  border-bottom: 1px solid var(--border);
}
.hist-item:last-child { border-bottom: none; }
.hist-label { font-size: 14px; }
.hist-val   { font-size: 14px; font-weight: 500; color: var(--teal); }
.hist-date  { font-size: 11px; color: var(--text3); }

/* ─── Chart ──────────────────────────────────────────────────── */
.chart-wrap { position: relative; height: 200px; }

/* ─── Status ─────────────────────────────────────────────────── */
.status { font-size: 12px; text-align: center; padding: 6px; min-height: 24px; }
.status.ok  { color: var(--teal); }
.status.err { color: var(--red); }
</style>
</head>
<body>

<nav>

<script>
/* ═══════════════════════════════════════════════════════════════
   CONFIG
═══════════════════════════════════════════════════════════════ */
const SB_URL = 'https://dodrzzgbdlucjbkmxbjn.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRvZHJ6emdiZGx1Y2pia214YmpuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MzUzOTQsImV4cCI6MjA4OTUxMTM5NH0.1NgZJnVAp0AKW_J0tnoZyi9in0uWSFScir7cEnB7BQg';
const sb = supabase.createClient(SB_URL, SB_KEY);

/* ═══════════════════════════════════════════════════════════════
   SCHEDULE & SESSIONS
═══════════════════════════════════════════════════════════════ */
const DAYS  = ['Ma','Ti','Ke','To','Pe','La','Su'];
const SCHED = { 0:'t1', 1:'kiekko', 2:'t2', 3:'t3', 4:'juoksu', 5:'lepo', 6:'kiekko' };

const SESS = {
  t1: { name:'Treeni 1 — Työntävät', focus:'Rinta, olkapäät, ojentajat', ex:[
    { n:'Rintapunnerruslaite',        t:'3×8',  s:3 },
    { n:'Pystypunnerruslaite',        t:'3×10', s:3 },
    { n:'Pec Deck (rintalaite)',      t:'3×12', s:3 },
    { n:'Vipunostolaite sivuille',    t:'3×15', s:3 },
    { n:'Dippilaite',                 t:'3×12', s:3 },
    { n:'Erikoisjalkaprässi 38°',     t:'3×10', s:3 },
    { n:'Vatsarutistuslaite',         t:'3×15', s:3 },
  ]},
  t2: { name:'Treeni 2 — Vetävät', focus:'Selkä, takaolkapäät, hauikset', ex:[
    { n:'Ylätaljalaite',                 t:'3×10', s:3 },
    { n:'Tuettu soutulaite (Verti)',     t:'3×10', s:3 },
    { n:'Face pulls taljassa',           t:'3×15', s:3 },
    { n:'Selänojennuslaite',             t:'3×15', s:3 },
    { n:'Hauiskääntölaite',              t:'3×12', s:3 },
    { n:'Reiden koukistuslaite',         t:'3×15', s:3 },
    { n:'Jalannostot',                   t:'3×15', s:3 },
  ]},
  t3: { name:'Treeni 3 — Hartiat + hauikset + ojentajat', focus:'Yläkehon viimeistely', ex:[
    { n:'Vipunostolaite sivuille',             t:'4×15', s:4 },
    { n:'Face pulls taljassa',                 t:'3×15', s:3 },
    { n:'Pystypunnerruslaite',                 t:'3×10', s:3 },
    { n:'Ojentajapunnerrus taljassa',          t:'4×12', s:4 },
    { n:'Hauiskääntö Hammer käsipainoilla',    t:'3×12', s:3 },
    { n:'Hauiskääntölaite tai talja',          t:'3×10', s:3 },
    { n:'Vatsarutistuslaite',                  t:'4×15', s:4 },
  ]},
  t4: { name:'Treeni 4 — Power & Core', focus:'Lisätreeni energiselle päivälle', ex:[
    { n:'Jalkaprässi (38°)',               t:'4×10',  s:4 },
    { n:'Ylätalja kapealla otteella',      t:'3×10',  s:3 },
    { n:'Rintapunnerruslaite (yksi käsi)', t:'3×12',  s:3 },
    { n:'Vatsarutistuslaite',              t:'3×15',  s:3 },
    { n:'Lankku',                          t:'3×45s', s:3 },
    { n:'Selänojennuslaite',               t:'3×15',  s:3 },
    { n:'Pohjenostot laitteessa',          t:'3×15',  s:3 },
  ]},
  kiekko: { name:'Jääkiekko',       focus:'Harrastejääkiekko + 10 000 askelta', ex:[] },
  juoksu: { name:'Juoksu / kävely', focus:'Hölkkä tai reipas kävely',           ex:[] },
  lepo:   { name:'Lepopäivä',       focus:'Palautuminen',                        ex:[] },
};

/* ═══════════════════════════════════════════════════════════════
   LOCAL STORAGE
═══════════════════════════════════════════════════════════════ */
let LD = JSON.parse(localStorage.getItem('treeni_v3') || '{}');
const saveLD = () => localStorage.setItem('treeni_v3', JSON.stringify(LD));

/* ═══════════════════════════════════════════════════════════════
   WEEK / DAY STATE
═══════════════════════════════════════════════════════════════ */
const todayIdx = () => { const d = new Date().getDay(); return d === 0 ? 6 : d - 1; };
let wOff = 0;
let aDay = todayIdx();

function wStart(o) {
  const n = new Date(), dy = n.getDay();
  const diff = dy === 0 ? -6 : 1 - dy;
  const m = new Date(n);
  m.setDate(n.getDate() + diff + o * 7);
  m.setHours(0, 0, 0, 0);
  return m;
}
function isoWeek(d) {
  const x = new Date(d);
  x.setHours(0,0,0,0);
  x.setDate(x.getDate() + 3 - (x.getDay() + 6) % 7);
  const w1 = new Date(x.getFullYear(), 0, 4);
  return 1 + Math.round(((x - w1) / 86400000 - 3 + (w1.getDay() + 6) % 7) / 7);
}

/* ═══════════════════════════════════════════════════════════════
   LOCAL DATA HELPERS
═══════════════════════════════════════════════════════════════ */
const dKey  = (o, d)    => `w${o}_d${d}`;
const eKey  = (o, d, e) => `${dKey(o,d)}_e${e}`;
const isDone    = (o, d)    => LD[`${dKey(o,d)}_done`] === true;
const setDone   = (o, d, v) => { LD[`${dKey(o,d)}_done`] = v; saveLD(); };
const getED     = (o, d, e) => LD[eKey(o, d, e)] || { sets: [] };

function saveSet(o, d, e, s, field, value) {
  const k = eKey(o, d, e);
  if (!LD[k]) LD[k] = { sets: [] };
  if (!LD[k].sets[s]) LD[k].sets[s] = {};
  LD[k].sets[s][field] = value;
  saveLD();
  updateSetBox(o, d, e, s);
  syncSet(o, d, e, s);
}

async function syncSet(o, d, e, s) {
  const st = getActiveSession(o, d), sess = SESS[st];
  if (!sess || !sess.ex[e]) return;
  const ex = sess.ex[e], ed = getED(o, d, e), sd = ed.sets[s] || {};
  if (!sd.kg && !sd.reps) return;
  const mon = wStart(o), dt = new Date(mon);
  dt.setDate(mon.getDate() + d);
  await sb.from('workout_sets').upsert({
    workout_date:  dt.toISOString().split('T')[0],
    exercise_name: ex.n,
    set_number:    s + 1,
    weight_kg:     parseFloat(sd.kg)  || null,
    reps:          parseInt(sd.reps)  || null,
  }, { onConflict: 'workout_date,exercise_name,set_number' });
}

/* ═══════════════════════════════════════════════════════════════
   PREVIOUS SESSION  (Supabase cache)
   prevCache[exerciseName] = [ {set_number, weight_kg, reps}, … ]
═══════════════════════════════════════════════════════════════ */
let prevCache = {};

async function loadPrevSession(o, d) {
  prevCache = {};
  const st = getActiveSession(o, d), sess = SESS[st];
  if (!sess || !sess.ex || !sess.ex.length) return;

  const names = sess.ex.map(e => e.n);
  const mon = wStart(o), dt = new Date(mon);
  dt.setDate(mon.getDate() + d);
  const todayStr = dt.toISOString().split('T')[0];

  const { data } = await sb
    .from('workout_sets')
    .select('workout_date,exercise_name,set_number,weight_kg,reps')
    .in('exercise_name', names)
    .lt('workout_date', todayStr)
    .order('workout_date', { ascending: false })
    .order('set_number',   { ascending: true  })
    .limit(300);

  if (!data) return;

  // Keep only the most recent date per exercise
  const latestDate = {};
  data.forEach(r => { if (!latestDate[r.exercise_name]) latestDate[r.exercise_name] = r.workout_date; });

  data.forEach(r => {
    if (r.workout_date !== latestDate[r.exercise_name]) return;
    if (!prevCache[r.exercise_name]) prevCache[r.exercise_name] = [];
    prevCache[r.exercise_name].push(r);
  });
}

const getPrevSet = (exName, setIdx) => {
  const sets = prevCache[exName];
  if (!sets) return null;
  return sets.find(s => s.set_number === setIdx + 1) || null;
};

/* ═══════════════════════════════════════════════════════════════
   SET STATUS LOGIC
   Returns: 'undone' | 'worse' | 'same' | 'better'
═══════════════════════════════════════════════════════════════ */
function setStatus(sd, prev) {
  const kg   = parseFloat(sd && sd.kg)   || null;
  const reps = parseInt(sd && sd.reps)   || null;

  if (!kg && !reps) return 'undone';
  if (!prev || (!prev.weight_kg && !prev.reps)) return 'same';

  const pKg = prev.weight_kg || 0, pReps = prev.reps || 0;
  const cKg = kg || 0,             cReps = reps || 0;

  if (cKg === pKg && cReps === pReps) return 'same';

  // Better: one improved, the other at least equal
  if ((cKg > pKg && cReps >= pReps) || (cReps > pReps && cKg >= pKg)) return 'better';

  // Worse: anything else (one or both dropped)
  return 'worse';
}

function updateSetBox(o, d, e, s) {
  const box = document.getElementById(`set-${o}-${d}-${e}-${s}`);
  if (!box) return;
  const ed   = getED(o, d, e);
  const sd   = (ed.sets && ed.sets[s]) || {};
  const sess = SESS[getActiveSession(o, d)];
  const exName = sess && sess.ex && sess.ex[e] ? sess.ex[e].n : null;
  const prev = exName ? getPrevSet(exName, s) : null;
  box.className = `set-box s-${setStatus(sd, prev)}`;
}

/* ═══════════════════════════════════════════════════════════════
   RENDER — WEEK
═══════════════════════════════════════════════════════════════ */
function renderTreeni() {
  const ws = wStart(wOff), wk = isoWeek(ws);
  document.getElementById('week-label').textContent = `Viikko ${wk} / ${ws.getFullYear()}`;

  const tabs = document.getElementById('day-tabs');
  tabs.innerHTML = '';
  DAYS.forEach((lb, i) => {
    const st = SCHED[i], isSali = ['t1','t2','t3'].includes(st);
    const btn = document.createElement('button');
    btn.className = 'day-tab';
    if (i === aDay)           btn.classList.add('active');
    else if (isDone(wOff, i)) btn.classList.add('done');
    else if (!isSali)         btn.classList.add('rest');
    btn.innerHTML = `${lb}<br><span style="font-size:9px;opacity:.6">${st.toUpperCase()}</span>`;
    btn.onclick = () => { aDay = i; renderTreeni(); };
    tabs.appendChild(btn);
  });

  const saliDays = [0, 2, 3];
  const done = saliDays.filter(d => isDone(wOff, d)).length;
  document.getElementById('prog-fill').style.width = Math.round(done / saliDays.length * 100) + '%';
  document.getElementById('prog-text').textContent  = `${done}/${saliDays.length} salikerrasta tehty`;

  renderSession();
}

/* ═══════════════════════════════════════════════════════════════
   RENDER — SESSION
═══════════════════════════════════════════════════════════════ */
const getSessionKey    = (o, d)     => `w${o}_d${d}_sess`;
const getActiveSession = (o, d)     => LD[getSessionKey(o,d)] || SCHED[d];
const setActiveSession = (o, d, st) => { LD[getSessionKey(o,d)] = st; saveLD(); renderTreeni(); };

const SESSION_LABELS = {
  t1:'T1 Työntävät', t2:'T2 Vetävät', t3:'T3 Hartiat',
  t4:'T4 Power', kiekko:'Jääkiekko', juoksu:'Juoksu', lepo:'Lepo',
};

async function renderSession() {
  const st = getActiveSession(wOff, aDay), sess = SESS[st];
  const el = document.getElementById('session-content');

  // Session type picker
  let html = `<div class="card" style="margin-bottom:8px">
    <div class="card-title">Päivän tyyppi</div>
    <div style="display:flex;gap:5px;flex-wrap:wrap;">`;
  Object.entries(SESSION_LABELS).forEach(([key, lbl]) => {
    const active = key === st;
    html += `<button onclick="setActiveSession(${wOff},${aDay},'${key}')"
      style="flex:1;min-width:64px;padding:7px 3px;
      background:${active ? 'var(--teal-bg)' : 'var(--surface2)'};
      border:1px solid ${active ? 'var(--teal)' : 'var(--border)'};
      border-radius:var(--rs);color:${active ? 'var(--teal)' : 'var(--text2)'};
      font-size:11px;font-weight:${active ? '600' : '400'};cursor:pointer;white-space:nowrap;">
      ${lbl}</button>`;
  });
  html += `</div></div>`;

  // Rest / activity day (no exercises)
  if (!sess || !sess.ex || !sess.ex.length) {
    const isRest = ['kiekko','juoksu','lepo'].includes(SCHED[aDay]);
    el.innerHTML = html + (isRest ? `<div class="card" style="text-align:center;padding:22px">
      <div style="font-size:16px;font-weight:600;margin-bottom:6px">${sess ? sess.name : '—'}</div>
      <div style="font-size:13px;color:var(--text3)">${sess ? sess.focus : ''}</div>
    </div>` : '');
    return;
  }

  // Fetch previous session data
  await loadPrevSession(wOff, aDay);

  const done = isDone(wOff, aDay);

  html += `<div class="card" style="margin-bottom:8px">
    <div style="font-size:16px;font-weight:600">${sess.name}</div>
    <div style="font-size:13px;color:var(--text3);margin-top:3px">${sess.focus}</div>
  </div>`;

  sess.ex.forEach((ex, ei) => {
    const ed   = getED(wOff, aDay, ei);
    const prev = prevCache[ex.n];

    // PR detection
    const cWeights = (ed.sets || []).map(s => parseFloat(s && s.kg)).filter(n => !isNaN(n) && n > 0);
    const pWeights = prev ? prev.map(s => s.weight_kg || 0) : [];
    const isPR = pWeights.length > 0 && cWeights.length > 0 && Math.max(...cWeights) > Math.max(...pWeights);

    // Previous session summary for header
    const prevSummary = prev && prev.length
      ? prev.map(s => `${s.weight_kg || '?'}×${s.reps || '?'}`).join('  ')
      : ex.t;

    html += `<div class="ex-item">
      <div class="ex-header">
        <span class="ex-name">${ex.n}${isPR ? '<span class="pr-badge">PR</span>' : ''}</span>
        <span class="ex-prev">ed:<br>${prevSummary}</span>
      </div>
      <div class="sets-row">`;

    for (let s = 0; s < ex.s; s++) {
      const sd      = (ed.sets && ed.sets[s]) || {};
      const prevSet = getPrevSet(ex.n, s);
      const status  = setStatus(sd, prevSet);
      const prevRef = prevSet
        ? `ed: ${prevSet.weight_kg || '?'}×${prevSet.reps || '?'}`
        : '';

      html += `<div class="set-box s-${status}" id="set-${wOff}-${aDay}-${ei}-${s}">
        <span class="set-label">S${s+1}</span>
        <div class="set-inputs">
          <input class="set-input" type="number" min="0" step=".5" placeholder="kg"
            value="${sd.kg || ''}"
            onchange="saveSet(${wOff},${aDay},${ei},${s},'kg',this.value)">
          <span class="set-sep">×</span>
          <input class="set-input" type="number" min="0" step="1" placeholder="tr"
            value="${sd.reps || ''}"
            onchange="saveSet(${wOff},${aDay},${ei},${s},'reps',this.value)">
        </div>
        ${prevRef ? `<span class="set-prev-ref">${prevRef}</span>` : ''}
      </div>`;
    }

    html += `</div></div>`;
  });

  html += `<button class="complete-btn ${done ? 'done' : ''}" onclick="toggleDone()">
    ${done ? 'Treeni tehty ✓' : 'Merkitse tehdyksi'}
  </button>`;

  el.innerHTML = html;
}

function toggleDone()    { setDone(wOff, aDay, !isDone(wOff, aDay)); renderTreeni(); }
function changeWeek(dir) { wOff += dir; renderTreeni(); }

/* ═══════════════════════════════════════════════════════════════
   BODY METRICS
═══════════════════════════════════════════════════════════════ */
async function loadBodyMetrics() {
  const { data: latest } = await sb.from('body_metrics').select('*')
    .order('measured_at', { ascending: false }).limit(1);

  if (latest && latest[0]) {
    const m = latest[0];
    document.getElementById('m-weight').textContent = m.weight_kg  ? `${m.weight_kg} kg` : '—';
    document.getElementById('m-fat')   .textContent = m.fat_pct    ? `${m.fat_pct}%`     : '—';
    document.getElementById('m-muscle').textContent = m.muscle_pct ? `${m.muscle_pct}%`  : '—';
  }

  const { data: hist } = await sb.from('body_metrics').select('*').order('measured_at').limit(20);
  if (hist && hist.length > 1) {
    if (window.bc) window.bc.destroy();
    window.bc = new Chart(document.getElementById('body-chart'), {
      type: 'line',
      data: {
        labels: hist.map(d => d.measured_at.slice(5)),
        datasets: [
          { label:'Paino',  data:hist.map(d=>d.weight_kg),  borderColor:'#1D9E75', borderWidth:2, pointRadius:3, pointBackgroundColor:'#1D9E75', tension:.3, fill:false, yAxisID:'y1' },
          { label:'Rasva%', data:hist.map(d=>d.fat_pct),    borderColor:'#378ADD', borderWidth:2, pointRadius:3, pointBackgroundColor:'#378ADD', tension:.3, fill:false, yAxisID:'y2' },
          { label:'Lihas%', data:hist.map(d=>d.muscle_pct), borderColor:'#EF9F27', borderWidth:2, pointRadius:3, pointBackgroundColor:'#EF9F27', tension:.3, fill:false, yAxisID:'y2' },
        ],
      },
      options: {
        responsive:true, maintainAspectRatio:false,
        plugins:{ legend:{ display:false } },
        scales:{
          y1:{ position:'left',  ticks:{ color:'#555', font:{size:10} }, grid:{ color:'#222' } },
          y2:{ position:'right', ticks:{ color:'#555', font:{size:10}, callback:v=>v+'%' }, grid:{ display:false } },
          x: { ticks:{ color:'#555', font:{size:10} }, grid:{ display:false } },
        },
      },
    });
  }
}

async function saveBodyMetrics() {
  const date = document.getElementById('body-date').value;
  if (!date) { showStatus('body-status','Valitse päivämäärä',true); return; }
  const { error } = await sb.from('body_metrics').upsert({
    measured_at: date,
    weight_kg:   parseNum('body-weight'),
    fat_pct:     parseNum('body-fat'),
    muscle_pct:  parseNum('body-muscle'),
  }, { onConflict:'measured_at' });
  if (error) { showStatus('body-status','Virhe: '+error.message,true); return; }
  showStatus('body-status','Tallennettu!',false);
  loadBodyMetrics();
}

/* ═══════════════════════════════════════════════════════════════
   ACTIVITIES
═══════════════════════════════════════════════════════════════ */
async function loadActivities() {
  const { data } = await sb.from('activity_data').select('*')
    .order('activity_date',{ ascending:false }).limit(10);
  const el = document.getElementById('act-history');
  if (!data || !data.length) {
    el.innerHTML = '<div style="color:var(--text3);font-size:13px">Ei aktiviteetteja vielä</div>';
    return;
  }
  el.innerHTML = data.map(a => `
    <div class="hist-item">
      <div><div class="hist-label">${a.activity_type}</div><div class="hist-date">${a.activity_date}</div></div>
      <div style="text-align:right">
        <div class="hist-val">${a.duration_min ? a.duration_min+' min' : '—'}</div>
        <div style="font-size:11px;color:var(--text3)">${a.calories?a.calories+' kcal':''}${a.avg_heart_rate?' · '+a.avg_heart_rate+' bpm':''}</div>
      </div>
    </div>`).join('');
}

async function saveActivity() {
  const date = document.getElementById('act-date').value;
  if (!date) { showStatus('act-status','Valitse päivämäärä',true); return; }
  const { error } = await sb.from('activity_data').insert({
    activity_date:  date,
    activity_type:  document.getElementById('act-type').value,
    duration_min:   parseInt(document.getElementById('act-duration').value) || null,
    calories:       parseInt(document.getElementById('act-calories').value) || null,
    avg_heart_rate: parseInt(document.getElementById('act-hr').value)       || null,
  });
  if (error) { showStatus('act-status','Virhe',true); return; }
  showStatus('act-status','Tallennettu!',false);
  loadActivities();
}

/* ═══════════════════════════════════════════════════════════════
   SLEEP
═══════════════════════════════════════════════════════════════ */
async function loadSleep() {
  const { data } = await sb.from('sleep_data').select('*')
    .order('sleep_date',{ ascending:false }).limit(7);
  if (data && data[0])
    document.getElementById('sleep-last').textContent = (data[0].duration_min/60).toFixed(1)+'h';
  if (data && data.length) {
    const avg = data.reduce((s,d)=>s+(d.duration_min||0),0)/data.length;
    document.getElementById('sleep-avg').textContent = (avg/60).toFixed(1)+'h';
    document.getElementById('sleep-history').innerHTML = data.map(s => `
      <div class="hist-item">
        <div><div class="hist-label">${s.sleep_date}</div></div>
        <div style="text-align:right">
          <div class="hist-val">${s.duration_min?(s.duration_min/60).toFixed(1)+'h':'—'}</div>
          <div style="font-size:11px;color:var(--text3)">${s.deep_sleep_min?'Syvä: '+s.deep_sleep_min+'min':''}${s.rem_sleep_min?' · REM: '+s.rem_sleep_min+'min':''}</div>
        </div>
      </div>`).join('');
  }
}

async function saveSleep() {
  const date = document.getElementById('sleep-date').value;
  if (!date) { showStatus('sleep-status','Valitse päivämäärä',true); return; }
  const { error } = await sb.from('sleep_data').upsert({
    sleep_date:     date,
    duration_min:   parseInt(document.getElementById('sleep-dur').value)  || null,
    deep_sleep_min: parseInt(document.getElementById('sleep-deep').value) || null,
    rem_sleep_min:  parseInt(document.getElementById('sleep-rem').value)  || null,
    awakenings:     parseInt(document.getElementById('sleep-awk').value)  || null,
  }, { onConflict:'sleep_date' });
  if (error) { showStatus('sleep-status','Virhe',true); return; }
  showStatus('sleep-status','Tallennettu!',false);
  loadSleep();
}

/* ═══════════════════════════════════════════════════════════════
   WORKOUT HISTORY
═══════════════════════════════════════════════════════════════ */
async function loadWorkoutHistory() {
  const { data } = await sb.from('workout_sets').select('*')
    .order('workout_date',  { ascending:false })
    .order('exercise_name', { ascending:true  })
    .limit(100);
  const el = document.getElementById('workout-history');
  if (!data || !data.length) {
    el.innerHTML = '<div style="color:var(--text3);font-size:13px">Ei lokeja vielä</div>';
    return;
  }
  const groups = {};
  data.forEach(s => {
    const k = `${s.workout_date}|${s.exercise_name}`;
    if (!groups[k]) groups[k] = { date:s.workout_date, name:s.exercise_name, sets:[] };
    groups[k].sets.push(s);
  });
  el.innerHTML = Object.values(groups).map(x => `
    <div class="hist-item">
      <div><div class="hist-label">${x.name}</div><div class="hist-date">${x.date}</div></div>
      <div style="text-align:right;font-size:12px;color:var(--text3)">
        ${x.sets.map(s=>`${s.weight_kg||'?'}×${s.reps||'?'}`).join(' | ')}
      </div>
    </div>`).join('');
}

/* ═══════════════════════════════════════════════════════════════
   UTILITIES
═══════════════════════════════════════════════════════════════ */
function parseNum(id) {
  const n = parseFloat(document.getElementById(id).value.replace(',','.'));
  return isNaN(n) ? null : n;
}

function showStatus(id, msg, isErr) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.className = 'status ' + (isErr ? 'err' : 'ok');
  setTimeout(() => { el.textContent = ''; el.className = 'status'; }, 3000);
}

function showPage(name, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  btn.classList.add('active');
  if (name === 'keho')         loadBodyMetrics();
  if (name === 'aktiviteetti') loadActivities();
  if (name === 'uni')          loadSleep();
  if (name === 'historia')     loadWorkoutHistory();
}

/* ═══════════════════════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════════════════════ */
['body-date','act-date','sleep-date'].forEach(id => {
  const el = document.getElementById(id);
  if (el) el.value = new Date().toISOString().split('T')[0];
});

renderTreeni();
</script>
